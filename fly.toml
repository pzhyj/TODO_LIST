app = "todo-list"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  DATA_DIR = "/var/data"

[mounts]
  source = "todo_data"
  destination = "/var/data"
